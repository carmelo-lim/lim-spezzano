<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIM Hall Ingresso - Carmelo Vomero</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* RESET E BLOCCO SCROLL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; /* Elimina definitivamente le barre di scorrimento */
            background-color: #001a33; 
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* PANNELLO CONTROLLO (TELECOMANDO) */
        #setup-panel { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            background: linear-gradient(135deg, #001a33 0%, #003366 100%); 
            overflow-y: auto; /* Qui lo scroll serve solo per i settaggi */
        }
        .setup-card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 600px; }
        .creator-tag { text-align: center; font-size: 11px; color: #ffd700; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        h2 { text-align: center; color: #ffd700; margin-bottom: 20px; font-size: 1.3rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 11px; font-weight: 600; color: #ffd700; }
        input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #f8f9fa; color: #333; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #update-btn { background: #00C851; color: white; }
        #start-btn { background: #ffd700; color: #001a33; }
        .url-box { margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px dashed #ffd700; font-size: 10px; }
        .url-display { background: white; color: #222; padding: 8px; border-radius: 5px; margin-top: 5px; cursor: pointer; text-align: center; font-weight: bold; overflow-wrap: break-word; }

        /* --- SCHERMATA LIM HALL (ADATTIVA E SENZA SCROLL) --- */
        #presentation-slide { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            flex-direction: column; 
            justify-content: space-between; /* Distribuisce sopra, centro e sotto */
            align-items: center;
            padding: 4vh 5vw; 
            background: radial-gradient(circle, #003366, #001a33); 
            text-align: center; 
            position: fixed; top: 0; left: 0;
        }

        /* Intestazione Scuola - Più grande e leggibile */
        #display-school { 
            font-size: clamp(22px, 4.5vh, 55px); 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 1.1;
            width: 100%;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .time-box { margin: 1vh 0; }
        #digital-clock { 
            font-size: clamp(60px, 16vh, 220px); 
            color: #ffd700; 
            font-weight: 900; 
            text-shadow: 0 0 50px rgba(255,215,0,0.5); 
            line-height: 0.9; 
        }
        #current-date { 
            font-size: clamp(18px, 3.2vh, 40px); 
            color: white; 
            opacity: 0.9; 
            text-transform: capitalize;
            margin-top: 5px;
        }

        /* Area Messaggio Centrale */
        .main-msg { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            width: 100%;
            margin: 2vh 0;
            padding: 0 20px;
            border-left: 15px solid #ffd700;
            border-right: 15px solid #ffd700;
            background: rgba(255,215,0,0.03);
        }
        #display-title {
            font-size: clamp(35px, 10vh, 140px); 
            font-weight: 900; 
            line-height: 1;
            display: block;
        }
        #display-highlight { 
            font-size: clamp(25px, 6vh, 85px);
            color: #ffd700; 
            display: block; 
            margin-top: 20px; 
            font-weight: 700;
            text-transform: uppercase;
        }
        
        /* Nota Finale - Ingrandita come richiesto */
        .footer-zone { width: 100%; }
        #display-footer { 
            font-size: clamp(24px, 5vh, 60px); 
            font-weight: 800; 
            background: rgba(255,215,0,0.15); 
            padding: 25px; 
            border-radius: 20px; 
            margin-bottom: 2vh;
            border: 2px solid rgba(255,215,0,0.3);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .signature { 
            font-size: clamp(14px, 2vh, 24px); 
            color: #ffd700; 
            font-weight: 600; 
            opacity: 0.8; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            border-top: 1px solid rgba(255,215,0,0.2); 
            padding-top: 15px; 
        }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #00C851; padding: 15px 30px; border-radius: 50px; transition: 0.5s; z-index: 10000; color: white; font-bold; }
    </style>
</head>
<body>

    <div id="toast">Copiato negli appunti!</div>

    <div id="setup-panel">
        <div class="setup-card">
            <div class="creator-tag">
                <i class="fa-solid fa-user-gear"></i> 
                ASSISTENTE TECNICO CARMELO VOMERO
            </div>
            <h2><i class="fa-solid fa-school"></i> GESTIONE LIM HALL</h2>
            
            <div class="input-group">
                <label>Intestazione Scuola</label>
                <textarea id="school-input" rows="3">Istituto Istruzione Superiore S. MARCO A.&#13;&#10;“ITCG – LC LS IPA SPEZZANO A.”&#13;&#10;San Marco Argentano (CS)</textarea>
            </div>

            <div class="input-group">
                <label>Messaggio Principale</label>
                <input type="text" id="title-input" value="BENVENUTI NELL'ISTITUTO">
            </div>

            <div class="input-group">
                <label>Sottotitolo (Oro)</label>
                <input type="text" id="highlight-input" value="SI RICEVE SOLO PER APPUNTAMENTO">
            </div>

            <div class="input-group">
                <label>Nota Finale (Più Grande)</label>
                <input type="text" id="footer-input" value="Buon lavoro a tutti i colleghi.">
            </div>

            <button class="btn" id="update-btn"><i class="fa-solid fa-paper-plane"></i> Aggiorna LIM Hall</button>
            <button class="btn" id="start-btn"><i class="fa-solid fa-desktop"></i> Schermo Intero LIM</button>

            <div class="url-box">
                <b>LINK PER IL RESPONSABILE:</b>
                <div class="url-display" id="admin-url">...</div>
                <br>
                <b>LINK PER LA LIM (HALL):</b>
                <div class="url-display" id="lim-url">...</div>
            </div>
        </div>
    </div>

    <div id="presentation-slide">
        <div id="display-school"></div>
        <div class="time-box">
            <div id="digital-clock">00:00:00</div>
            <div id="current-date"></div>
        </div>
        <div class="main-msg">
            <span id="display-title"></span>
            <span id="display-highlight"></span>
        </div>
        <div class="footer-zone">
            <div id="display-footer"></div>
            <div class="signature"><i class="fa-solid fa-user-gear"></i> Ideato dall'Assistente Tecnico Carmelo Vomero</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh5dxeRSQF_r6pi2UW5dOQASc2Su9aiWU",
            authDomain: "lim-spezzano.firebaseapp.com",
            projectId: "lim-spezzano",
            storageBucket: "lim-spezzano.firebasestorage.app",
            messagingSenderId: "312130457648",
            appId: "1:312130457648:web:0e8879c80f7b273e2c9df5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const hallId = "HALL_INGRESSO";

        const adminUrlDiv = document.getElementById('admin-url');
        const limUrlDiv = document.getElementById('lim-url');

        function refreshLinks() {
            const base = window.location.origin + window.location.pathname;
            adminUrlDiv.innerText = `${base}?admin=${hallId}`;
            limUrlDiv.innerText = `${base}?aula=${hallId}`;
        }
        refreshLinks();

        [adminUrlDiv, limUrlDiv].forEach(el => {
            el.onclick = () => {
                navigator.clipboard.writeText(el.innerText);
                const t = document.getElementById('toast');
                t.style.top = '20px';
                setTimeout(() => t.style.top = '-100px', 2000);
            };
        });

        document.getElementById('update-btn').onclick = async () => {
            try {
                await setDoc(doc(db, 'messaggi', hallId), {
                    school: document.getElementById('school-input').value,
                    title: document.getElementById('title-input').value,
                    highlight: document.getElementById('highlight-input').value,
                    footer: document.getElementById('footer-input').value,
                    lastUpdate: Date.now()
                });
                alert("Aggiornato!");
            } catch (e) { alert("Errore connessione."); }
        };

        function startLIMMode() {
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('presentation-slide').style.display = 'flex';
            
            setInterval(() => {
                const now = new Date();
                document.getElementById('digital-clock').innerText = now.toLocaleTimeString('it-IT');
                document.getElementById('current-date').innerText = now.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            }, 1000);

            onSnapshot(doc(db, 'messaggi', hallId), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('display-school').innerHTML = d.school.replace(/\n/g, '<br>');
                    document.getElementById('display-title').innerText = d.title;
                    document.getElementById('display-highlight').innerText = d.highlight;
                    document.getElementById('display-footer').innerText = d.footer;
                }
            });
        }

        document.getElementById('start-btn').onclick = startLIMMode;

        const params = new URLSearchParams(window.location.search);
        if(params.get('aula')) {
            startLIMMode();
        } else if(params.get('admin')) {
            onSnapshot(doc(db, 'messaggi', hallId), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('school-input').value = d.school;
                    document.getElementById('title-input').value = d.title;
                    document.getElementById('highlight-input').value = d.highlight;
                    document.getElementById('footer-input').value = d.footer;
                }
            });
        }
    </script>
</body>
</html>
